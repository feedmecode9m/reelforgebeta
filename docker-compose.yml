services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reelforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend        # <--- THIS IS THE FIX
    image: reel-forge-backend
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/reelforge
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build: 
      context: .            # <--- Frontend needs to see the whole folder
      dockerfile: Frontend.Dockerfile
    image: reel-forge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
