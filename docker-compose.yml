services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reelforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build:
      context: ./backend
    network_mode: host
    image: reel-forge-backend
    environment:
      DATABASE_URL: postgres://user:password@127.0.0.1:5432/reelforge
      REELFORGE_ENV: production
      REELFORGE_INGESTION_V2: "true"
      MEDIA_PUBLIC_BASE: http://localhost:8080
      PORT: "8080"
    volumes:
      - reelforge_media:/app/public
    depends_on:
      - db
    ports:
      - "127.0.0.1:8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Frontend.Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:8080
    image: reel-forge-frontend
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  reelforge_media:
