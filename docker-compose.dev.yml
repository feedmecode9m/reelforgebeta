services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reelforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d reelforge"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:5432:5432"
    stop_signal: SIGTERM

  backend:
    build:
      context: ./backend
    working_dir: /app
    command: ["cargo", "run"]
    environment:
      DATABASE_URL: postgres://user:password@db:5432/reelforge
      REELFORGE_ENV: development
      PORT: "8080"
      REELFORGE_INGESTION_V2: "true"
      MEDIA_PUBLIC_BASE: http://localhost:8080
    volumes:
      - ./backend:/app
      - backend_target:/app/target
      - reelforge_media:/app/public
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:8080:8080"
    stop_signal: SIGTERM

  frontend:
    image: node:20-alpine
    working_dir: /workspace/frontend
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5174"]
    environment:
      VITE_BACKEND_URL: http://localhost:8080
      VITE_DEBUG_API: ${VITE_DEBUG_API:-false}
    volumes:
      - ./frontend:/workspace/frontend
      - frontend_node_modules:/workspace/frontend/node_modules
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:5174:5174"
    stop_signal: SIGTERM

volumes:
  postgres_data:
  reelforge_media:
  backend_target:
  frontend_node_modules:
